server {
    listen       80;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # ── Security headers ─────────────────────────────────────
    add_header X-Frame-Options           "SAMEORIGIN"                        always;
    add_header X-Content-Type-Options    "nosniff"                           always;
    add_header X-XSS-Protection          "1; mode=block"                     always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"   always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;

    # ── Health check ─────────────────────────────────────────
    # Docker HEALTHCHECK and load balancers hit this endpoint.
    # Returns 200 instantly — no proxy, no file read.
    location /health {
        access_log  off;
        return 200  "ok\n";
        add_header  Content-Type text/plain;
    }

    # ── Auth routes — stricter rate limit ────────────────────
    # /api/auth/* gets its own zone (5 req/s) to slow brute-force
    # attempts on login/register without affecting other API calls.
    location /api/auth/ {
        limit_req  zone=auth_limit  burst=10  nodelay;

        proxy_pass         http://backend-service:3000/auth/;
        proxy_http_version 1.1;

        proxy_set_header   Host               $host;
        proxy_set_header   X-Real-IP          $remote_addr;
        proxy_set_header   X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto  $scheme;

        # Forward cookies — required for withCredentials: true
        proxy_set_header   Cookie             $http_cookie;

        proxy_connect_timeout  5s;
        proxy_read_timeout     30s;
        proxy_send_timeout     30s;
    }

    # ── All other API routes ──────────────────────────────────
    # /api/* → strips /api prefix → forwards to api container
    #
    # Example:
    #   Browser sends:      GET  /api/products
    #   Backend receives:   GET  /products
    #
    # The trailing slash on proxy_pass is what strips /api —
    # remove it and the backend would receive /api/products.
    location /api/ {
        limit_req  zone=api_limit  burst=20  nodelay;

        proxy_pass         http://backend-service:3000/;
        proxy_http_version 1.1;

        proxy_set_header   Host               $host;
        proxy_set_header   X-Real-IP          $remote_addr;
        proxy_set_header   X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto  $scheme;

        # Forward cookies — required for withCredentials: true
        proxy_set_header   Cookie             $http_cookie;

        # WebSocket support (needed for socket.io / live features)
        proxy_set_header   Upgrade            $http_upgrade;
        proxy_set_header   Connection         "upgrade";

        proxy_connect_timeout  5s;
        proxy_read_timeout     60s;
        proxy_send_timeout     60s;

        proxy_buffering       on;
        proxy_buffer_size     4k;
        proxy_buffers         8 4k;
    }

    # ── Hashed static assets — cache forever ─────────────────
    # Vite adds a content hash to every JS/CSS filename on build
    # (e.g. index-Dq8vXB3k.js) so a new deploy = new filename.
    # It is safe to tell the browser to cache these indefinitely.
    location ~* \.(js|css|woff2|woff|ttf|eot)$ {
        expires    1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location ~* \.(png|jpg|jpeg|gif|ico|svg|webp)$ {
        expires    30d;
        add_header Cache-Control "public";
        access_log off;
    }

    # ── SPA fallback ─────────────────────────────────────────
    # Any URL not matched above (e.g. /dashboard, /profile/42)
    # returns index.html so React Router handles routing
    # client-side instead of nginx returning a 404.
    location / {
        try_files  $uri  $uri/  /index.html;
    }

    # ── Block dot-files ──────────────────────────────────────
    # Prevents access to .env, .git, .htaccess, etc.
    location ~ /\. {
        deny           all;
        access_log     off;
        log_not_found  off;
    }
}