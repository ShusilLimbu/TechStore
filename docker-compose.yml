name: TechStore
services:

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: backend_service
    restart: always
    environment:
      - NODE_ENV=production
      - DB_HOST=db
      - MONGO_URI=mongodb://mongo:27017/mydb
    ports:
      - '3000:3000'
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - app_network
    volumes:
      - ./backend:/backend
    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '3'

  mongo:
    image: mongo
    container_name: mongo
    restart: always
    ports:
      - '27017:27017'
    volumes:
      - mongo-data:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: root
    
  mongo-express:
    image: mongo-express:latest
    restart: always
    container_name: mongo-express
    ports:
      - '8081:8081'
    environment:
      ME_CONFIG_MONGODB_URL: mongodb://root:root@mongo:27017/
      ME_CONFIG_BASICAUTH_ENABLED: true
      ME_CONFIG_BASICAUTH_USERNAME: mongoexpressuser
      ME_CONFIG_BASICAUTH_PASSWORD: mongoexpresspass

  frontend:
    build: 
      context: ./frontend
      dockerfile: Dockerfile
    container_name: frontend-service
    restart: always
    environment:
      - VITE_API_BASE_URL=http://localhost:3000
    ports:
      - '80:80'
    depends_on:
      - backend
    networks:
      - app_network
  
  nginx:
    image: nginx:latest
    container_name: nginx-proxy
    restart: always
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "8080:80"
    depends_on:
      - frontend
      - backend
    networks:
      - app_network

networks:
  app_network:
    driver: bridge
    
    
volumes:
  mongo-data: